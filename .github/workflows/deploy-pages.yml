name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.19.0'

      - name: Install dependencies
        working-directory: website
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Next.js
        working-directory: website
        run: npm run build

      - name: Add .nojekyll for GitHub Pages
        run: touch website/out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  post-deploy-check:
    name: Post-deployment health check
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Verify deployment URL is reachable
        run: |
          sleep 10
          curl -sfI --max-time 30 "https://sufiyan-sabeel.github.io/AIRIS-CLI/" 2>/dev/null && echo "Site is reachable" || echo "Warning: site unreachable (may still be propagating)"
